name: Deploy → Production

# release/*.*.* (e.g. release/1.4.0) → production
on:
  push:
    branches:
      - 'release/*.*.*'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from branch name
        id: version
        run: echo "tag=${GITHUB_REF#refs/heads/release/}" >> "$GITHUB_OUTPUT"

      - name: Compute lowercase image name
        id: img
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/spoony
            cd /opt/spoony

            # Log in so the server can pull the (possibly private) GHCR image.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # App environment (matches backend/config/config.go).
            cat > .env << 'EOF'
            ENV=production
            LOG_LEVEL=info
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
            TELEGRAM_MINI_APP_URL=${{ secrets.MINI_APP_URL }}
            WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_HOURS=720
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
            EOF

            # Host port defaults to 80 on production (override with the EXPOSE_PORT secret).
            PORT="${{ secrets.EXPOSE_PORT }}"
            : "${PORT:=80}"

            # Reserved ngrok domain (WEBHOOK_URL minus the scheme) that the
            # ngrok sidecar tunnels to the app container's port 80.
            NGROK_DOMAIN="${{ secrets.WEBHOOK_URL }}"
            NGROK_DOMAIN="${NGROK_DOMAIN#https://}"
            NGROK_DOMAIN="${NGROK_DOMAIN#http://}"

            # Pin to the exact released version for an immutable, rollback-friendly deploy.
            cat > docker-compose.yml << EOF
            services:
              app:
                image: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ steps.version.outputs.tag }}
                env_file: .env
                ports:
                  - "${PORT}:80"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: unless-stopped
              ngrok:
                image: ngrok/ngrok:latest
                command: http app:80 --domain=${NGROK_DOMAIN} --log stdout
                environment:
                  - NGROK_AUTHTOKEN=${{ secrets.NGROK_AUTHTOKEN }}
                restart: unless-stopped
            volumes:
              postgres_data:
            EOF

            docker compose --project-name spoony_prod pull
            docker compose --project-name spoony_prod up -d
            docker image prune -f
