name: Deploy → Staging

# main → staging
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:staging
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/spoony-staging
            cd /opt/spoony-staging

            # Log in so the server can pull the (possibly private) GHCR image.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # App environment (matches backend/config/config.go).
            cat > .env << 'EOF'
            ENV=production
            LOG_LEVEL=info
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
            TELEGRAM_MINI_APP_URL=${{ secrets.MINI_APP_URL }}
            WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_HOURS=720
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
            EOF

            # Host port defaults to 8081 on staging (override with the EXPOSE_PORT secret).
            PORT="${{ secrets.EXPOSE_PORT }}"
            : "${PORT:=8081}"

            cat > docker-compose.yml << EOF
            services:
              app:
                image: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:staging
                env_file: .env
                ports:
                  - "${PORT}:80"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                restart: unless-stopped
            volumes:
              postgres_data:
            EOF

            docker compose --project-name spoony_staging pull
            docker compose --project-name spoony_staging up -d
            docker image prune -f
