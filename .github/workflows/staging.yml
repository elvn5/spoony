name: Deploy → Staging

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/dream-diary-staging

            cat > .env << 'EOF'
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
            TELEGRAM_MINI_APP_URL=${{ secrets.STAGING_MINI_APP_URL }}
            TELEGRAM_CHANNEL_URL=${{ secrets.TELEGRAM_CHANNEL_URL }}
            WEBHOOK_URL=${{ secrets.STAGING_WEBHOOK_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION_HOURS=720
            CORS_ALLOWED_ORIGINS=${{ secrets.STAGING_CORS_ORIGINS }}
            ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
            ENV=production
            EOF

            docker compose -f docker-compose.prod.yml --project-name dream_staging pull
            docker compose -f docker-compose.prod.yml --project-name dream_staging up -d
            docker image prune -f
